name: Container Image CI

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master

env:
  UI_IMAGE_NAME: protin_ui
  API_IMAGE_NAME: protin_api
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.VERSION }}
      image_owner: ${{ steps.image_base.outputs.OWNER }}
    steps:
      - name: Prepare version metadata
        id: meta
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          [ "$VERSION" == "master" ] && VERSION=latest
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Prepare image base name
        id: image_base
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_OUTPUT
          echo "Image owner: $OWNER"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UI image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./protin-frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/${{ env.UI_IMAGE_NAME }}:${{ matrix.arch }}-${{ needs.prepare.outputs.version }}
          labels: runnumber=${{ github.run_id }}

      - name: Build and push API image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./protin-backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/${{ env.API_IMAGE_NAME }}:${{ matrix.arch }}-${{ needs.prepare.outputs.version }}
          labels: runnumber=${{ github.run_id }}

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
      contents: read

    steps:
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push UI multi-arch manifest
        run: |
          IMAGE_NAME=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/${{ env.UI_IMAGE_NAME }}
          VERSION=${{ needs.prepare.outputs.version }}
          docker manifest create $IMAGE_NAME:$VERSION \
            --amend $IMAGE_NAME:amd64-$VERSION \
            --amend $IMAGE_NAME:arm64-$VERSION
          docker manifest push $IMAGE_NAME:$VERSION

      - name: Create and push API multi-arch manifest
        run: |
          IMAGE_NAME=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/${{ env.API_IMAGE_NAME }}
          VERSION=${{ needs.prepare.outputs.version }}
          docker manifest create $IMAGE_NAME:$VERSION \
            --amend $IMAGE_NAME:amd64-$VERSION \
            --amend $IMAGE_NAME:arm64-$VERSION
          docker manifest push $IMAGE_NAME:$VERSION
